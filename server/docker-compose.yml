version: '3.8'

services:
  eto-server:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Mount your code for development
      - ./src:/app/src
      - ./logs:/app/logs
      # Mount Access database if using one (update path to your actual .accdb file)
      # - C:/path/to/your/database.accdb:/app/data/database.accdb:ro
    environment:
      # Server settings
      - PIPELINE_PORT=8000
      - PIPELINE_HOST=0.0.0.0
      - DEBUG=true
      - RELOAD=true
      - WORKERS=1

      # Logging
      - LOG_LEVEL=INFO
      - LOG_COLORS=true
      - LOG_TRACEBACKS=true
      - LOGS_DIR=logs

      # Main Database - Use host.docker.internal to connect to host machine
      - DATABASE_URL=mssql+pyodbc://test:test@host.docker.internal:49172/eto?driver=ODBC+Driver+17+for+SQL+Server&TrustServerCertificate=yes

      # Access DB (if using) - Point to mounted volume
      # - HTC_DB_CONNECTION_STRING=Driver={Microsoft Access Driver (*.mdb, *.accdb)};DBQ=/app/data/database.accdb;

    extra_hosts:
      # This allows container to reach host machine databases
      - "host.docker.internal:host-gateway"

    networks:
      - eto-network

networks:
  eto-network:
    driver: bridge
