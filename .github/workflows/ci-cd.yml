name: ETO Server CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "server/**"
      - ".github/workflows/ci-cd.yml"
  pull_request:
    branches: [main]
    paths:
      - "server/**"

env:
  NODE_VERSION: "18"

jobs:
  test:
    name: Test Server
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: TestPassword123!
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P TestPassword123! -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Generate Prisma client
        working-directory: ./server
        run: npm run prisma:generate

      - name: Run database migrations
        working-directory: ./server
        env:
          DATABASE_URL: "sqlserver://localhost:1433;database=eto_test;user=sa;password=TestPassword123!;trustServerCertificate=true"
        run: npm run prisma:migrate

      - name: Run linting
        working-directory: ./server
        run: npm run lint

      - name: Run tests
        working-directory: ./server
        env:
          DATABASE_URL: "sqlserver://localhost:1433;database=eto_test;user=sa;password=TestPassword123!;trustServerCertificate=true"
          NODE_ENV: test
        run: npm test

      - name: Build server
        working-directory: ./server
        run: npm run build

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Build server
        working-directory: ./server
        run: npm run build

      - name: Create deployment package
        run: |
          cd server
          tar -czf ../eto-server-deploy.tar.gz dist/ package.json package-lock.json prisma/ env.example deploy.ps1 README.md

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: eto-server-deploy
          path: eto-server-deploy.tar.gz
          retention-days: 1

      - name: Trigger server deployment
        run: |
          curl -X POST ${{ secrets.DEPLOY_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}", "repository": "${{ github.repository }}"}'
